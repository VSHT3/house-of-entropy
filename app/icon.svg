<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- House of Entropy mark: a flat-top hexagonal room (the library's cell) framing a single
       lit book. Dark leather ground + antique-gold line work, matching the in-world palette. -->
  <rect width="64" height="64" rx="12" fill="#0d0b09"/>
  <!-- flat-top hexagon: vertices at the 6 corners of a flat-top hex inscribed in the tile -->
  <polygon points="32,8 53.8,20 53.8,44 32,56 10.2,44 10.2,20"
           fill="#15110c" stroke="#c9a24b" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- inner hex echo (a shelf ring) -->
  <polygon points="32,17 45.9,25 45.9,39 32,47 18.1,39 18.1,25"
           fill="none" stroke="#7a5e2a" stroke-width="1.4" stroke-linejoin="round" opacity="0.8"/>
  <!-- a single standing book at the centre: spine slab + gilt label -->
  <rect x="28.5" y="24" width="7" height="16" rx="1" fill="#8a2f24" stroke="#e3c878" stroke-width="1"/>
  <rect x="29.8" y="28.5" width="4.4" height="1.6" rx="0.5" fill="#e3c878"/>
  <rect x="29.8" y="31.5" width="4.4" height="1.6" rx="0.5" fill="#e3c878" opacity="0.7"/>
</svg>
